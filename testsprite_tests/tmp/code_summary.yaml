version: "2"
type: frontend
tech_stack:
  - react
  - vite
  - tailwindcss
  - firebase
  - typescript
routes:
  - path: /
    file: src/pages/home/HomePage.tsx
    auth_required: false
    description: Home page
  - path: /signin
    file: src/pages/auth/SignIn.tsx
    auth_required: false
    description: User sign in page
  - path: /signup
    file: src/pages/auth/SignUp.tsx
    auth_required: false
    description: User sign up page
  - path: /profile
    file: src/pages/profile/ProfilePage.tsx
    auth_required: true
    description: User profile page
  - path: /courses
    file: src/pages/courses/CourseSearchPage.tsx
    auth_required: false
    description: Course search page
  - path: /instructors
    file: src/pages/instructors/InstructorsListPage.tsx
    auth_required: false
    description: Instructors list page
  - path: /schools
    file: src/pages/schools/SchoolsListPage.tsx
    auth_required: false
    description: Schools list page
features:
  - name: User Login
    description: Login with email and password credentials
    files:
      - src/pages/auth/SignIn.tsx
      - src/common/hooks/useAuth.ts
    entry_route: /signin
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Login button to submit
    api_calls: []
    auth_required: false
  - name: Explore Courses
    description: Search and filter dance courses
    files:
      - src/pages/courses/CourseSearchPage.tsx
    entry_route: /courses
    user_interactions:
      - Enter search term
      - Select filters
      - View course list
    api_calls: []
    auth_required: false
known_limitations: []
